version: '3.8'

services:
  # ==========================================
  # 1. Common Database (Accessible on Port 3306)
  # ==========================================
  common-db:
    image: mysql:8.0
    container_name: common_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: common_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - "3306:3306" 
    volumes:
      # Look inside the sql_scripts folder for the init file
      - ./sql_scripts/init_common.sql:/docker-entrypoint-initdb.d/init.sql
      # Save the live database data into the local db_data/common folder
      - ./db_data/common:/var/lib/mysql
    restart: unless-stopped

  # ==========================================
  # 2. House Database (Accessible on Port 3307)
  # ==========================================
  house-db:
    image: mysql:8.0
    container_name: house_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: house_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - "3307:3306" 
    volumes:
      # Look inside the sql_scripts folder for the init file
      - ./sql_scripts/init_house.sql:/docker-entrypoint-initdb.d/init.sql
      # Save the live database data into the local db_data/house folder
      - ./db_data/house:/var/lib/mysql
    restart: unless-stopped

  # ==========================================
  # 3. Workers Database (Accessible on Port 3308)
  # ==========================================
  workers-db:
    image: mysql:8.0
    container_name: workers_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: workers_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - "3308:3306" 
    volumes:
      # Look inside the sql_scripts folder for the init file
      - ./sql_scripts/init_workers.sql:/docker-entrypoint-initdb.d/init.sql
      # Save the live database data into the local db_data/workers folder
      - ./db_data/workers:/var/lib/mysql
    restart: unless-stopped